<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nirengi - Akıllı AI Rehberi</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary-blue: #007bff;
            --bg-light: #f4f7f9;
            --white: #ffffff;
            --text-main: #333;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        body { font-family: 'Poppins', sans-serif; background: var(--bg-light); color: var(--text-main); margin: 0; }

        /* Dil Seçeneği ve Navigasyon */
        header { background: var(--white); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 24px; font-weight: 700; color: var(--primary-blue); text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .lang-switch { cursor: pointer; padding: 5px 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }

        /* Favoriler Paneli (Hidden by default) */
        #fav-panel { position: fixed; right: -100%; top: 0; width: 350px; height: 100%; background: var(--white); z-index: 2000; box-shadow: -5px 0 15px rgba(0,0,0,0.1); transition: 0.4s; padding: 20px; overflow-y: auto; }
        #fav-panel.open { right: 0; }

        /* Arama Alanı */
        .hero { background: var(--primary-blue); color: var(--white); padding: 60px 20px; text-align: center; }
        .search-container { max-width: 700px; margin: 20px auto; background: white; border-radius: 50px; display: flex; padding: 5px; }
        .search-container input { flex: 1; border: none; padding: 15px 25px; border-radius: 50px; outline: none; }
        .search-container button { background: var(--primary-blue); color: white; border: none; padding: 10px 30px; border-radius: 50px; cursor: pointer; }

        /* Kartlar */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; padding: 40px 5%; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: var(--shadow); position: relative; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .fav-icon { position: absolute; top: 15px; right: 15px; cursor: pointer; font-size: 20px; color: #ccc; }
        .fav-icon.active { color: #ff4757; }

        /* Trendyol Tarzı Yorum Paneli */
        .comment-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 3000; }
        .modal-content { background: white; width: 90%; max-width: 600px; border-radius: 20px; padding: 30px; max-height: 80vh; overflow-y: auto; }
        .filter-stars { display: flex; gap: 10px; margin: 20px 0; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .star-badge { cursor: pointer; padding: 5px 15px; border-radius: 20px; border: 1px solid #ddd; font-size: 13px; }
        .star-badge.active { background: var(--primary-blue); color: white; border-color: var(--primary-blue); }

        .fav-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding: 10px 0; }
        .btn-visit { color: var(--primary-blue); text-decoration: none; font-weight: 600; font-size: 13px; }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo"><i class="fas fa-compass"></i> Nirengi</a>
        <div class="nav-right">
            <div class="lang-switch" onclick="toggleLang()"><i class="fas fa-globe"></i> <span id="lang-text">EN</span></div>
            <i class="fas fa-heart" style="cursor:pointer; color: #ff4757;" onclick="toggleFavPanel()"></i>
        </div>
    </header>

    <div id="fav-panel">
        <h3><i class="fas fa-heart"></i> Favorilerim</h3>
        <hr>
        <div id="fav-list">
            </div>
        <button onclick="toggleFavPanel()" style="width:100%; margin-top:20px; padding:10px; border:none; background:#eee; border-radius:5px; cursor:pointer;">Kapat</button>
    </div>

    <section class="hero">
        <h1 id="hero-title">İşine En Uygun Yapay Zekayı Bul</h1>
        <p id="hero-sub">Gemini AI Destekli Akıllı Analiz</p>
        <div class="search-container">
            <input type="text" id="userQuery" placeholder="Ne yapmak istiyorsun? Detaylıca anlat...">
            <button onclick="askGemini()">AI Bul</button>
        </div>
    </section>

    <div class="grid" id="ai-grid">
        </div>

    <div class="comment-modal" id="commentModal">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between;">
                <h3 id="modal-title">Kullanıcı Yorumları</h3>
                <span onclick="closeModal()" style="cursor:pointer; font-size:24px;">&times;</span>
            </div>
            <div class="filter-stars" id="starFilters">
                <div class="star-badge active" onclick="filterComments('all')">Tümü</div>
                <div class="star-badge" onclick="filterComments(5)">5 ⭐</div>
                <div class="star-badge" onclick="filterComments(4)">4 ⭐</div>
                <div class="star-badge" onclick="filterComments(3)">3 ⭐</div>
            </div>
            <div id="comments-body"></div>
        </div>
    </div>

    <script>
        const GEMINI_API_KEY = "BURAYA_API_KEYINI_YAPISTIR";
        let currentLang = 'TR';
        let favorites = JSON.parse(localStorage.getItem('nirengi_favs')) || [];

        // Örnek Veri (Gerçek yorumları Play Store'dan buraya manuel veya API ile çekip ekleyebilirsin)
        const aiData = [
            {
                id: 'gpt',
                name: 'ChatGPT',
                desc: 'Metin üretimi ve asistanlık.',
                link: 'https://chat.openai.com',
                reviews: [
                    {star: 5, text: "Uygulama harika, ödevlerimde çok yardımcı oluyor.", author: "Zeynep", date: "2024-03-01"},
                    {star: 4, text: "Hızlı ama bazen yanlış bilgi veriyor.", author: "Mert", date: "2024-02-15"},
                    {star: 2, text: "Ücretsiz sürüm çok yavaşladı.", author: "Ali", date: "2024-01-20"}
                ]
            }
        ];

        // Favorileme Fonksiyonu
        function toggleFavorite(id, name, link) {
            const index = favorites.findIndex(f => f.id === id);
            if(index > -1) {
                favorites.splice(index, 1);
            } else {
                favorites.push({id, name, link, date: new Date().toLocaleString()});
            }
            localStorage.setItem('nirengi_favs', JSON.stringify(favorites));
            updateFavUI();
            renderCards();
        }

        function updateFavUI() {
            const list = document.getElementById('fav-list');
            list.innerHTML = favorites.map(f => `
                <div class="fav-item">
                    <div>
                        <strong>${f.name}</strong><br>
                        <small>${f.date}</small>
                    </div>
                    <a href="${f.link}" target="_blank" class="btn-visit">GİT</a>
                </div>
            `).join('');
        }

        function toggleFavPanel() {
            document.getElementById('fav-panel').classList.toggle('open');
        }

        function renderCards() {
            const grid = document.getElementById('ai-grid');
            grid.innerHTML = aiData.map(ai => `
                <div class="card">
                    <i class="fas fa-heart fav-icon ${favorites.some(f => f.id === ai.id) ? 'active' : ''}" 
                       onclick="toggleFavorite('${ai.id}', '${ai.name}', '${ai.link}')"></i>
                    <h3>${ai.name}</h3>
                    <p>${ai.desc}</p>
                    <button onclick="openComments('${ai.id}')" style="background:none; border:1px solid #ddd; padding:5px 10px; border-radius:5px; cursor:pointer;">Yorumları Gör</button>
                </div>
            `).join('');
        }

        // Trendyol Tarzı Filtreleme
        let activeAiId = '';
        function openComments(id) {
            activeAiId = id;
            document.getElementById('commentModal').style.display = 'flex';
            filterComments('all');
        }

        function filterComments(star) {
            const ai = aiData.find(a => a.id === activeAiId);
            const filtered = star === 'all' ? ai.reviews : ai.reviews.filter(r => r.star === star);
            
            document.querySelectorAll('.star-badge').forEach(b => b.classList.remove('active'));
            // Filtreleme görselini güncelleme kodları...

            document.getElementById('comments-body').innerHTML = filtered.map(r => `
                <div style="border-bottom: 1px solid #eee; padding: 10px 0;">
                    <div>${"⭐".repeat(r.star)}</div>
                    <p style="font-size:14px; margin:5px 0;">${r.text}</p>
                    <small style="color:#999">${r.author} - ${r.date}</small>
                </div>
            `).join('');
        }

        function closeModal() { document.getElementById('commentModal').style.display = 'none'; }

        // Gemini API Entegrasyonu (Beyin Kısmı)
        async function askGemini() {
            const query = document.getElementById('userQuery').value;
            if(!query) return;
            
            // Burada Gemini'ye query'i gönderip uygun AI kategorisini döndüren fetch kodunu ekleyebilirsin.
            alert("Gemini şu an analiz ediyor... (API Keyini koda eklemeyi unutma!)");
        }

        function toggleLang() {
            currentLang = currentLang === 'TR' ? 'EN' : 'TR';
            document.getElementById('lang-text').innerText = currentLang === 'TR' ? 'EN' : 'TR';
            // Sayfa içeriğini dile göre güncelle...
        }

        window.onload = () => { renderCards(); updateFavUI(); };
    </script>
</body>
</html>
