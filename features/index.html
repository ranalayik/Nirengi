<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nirengi — Sana Özel Yapay Zeka Sıralaması</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=Instrument+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* CLAUDE'UN TÜM GÖRSEL DEĞİŞKENLERİ VE TASARIMI */
    :root {
      --bg:#07090f;--surface:#0e1219;--surface2:#141a24;--surface3:#1a2130;
      --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
      --accent:#00e5a0;--accent-dim:rgba(0,229,160,0.12);
      --accent2:#6c5ce7;--accent3:#fd7b4d;--gold:#f5c842;
      --text:#dde4f0;--muted:#5a6a85;--muted2:#8494af;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
    
    /* Arkaplan Efektleri (Blobs) */
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,160,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,160,.025) 1px,transparent 1px);background-size:56px 56px;pointer-events:none;z-index:0;}
    .blob{position:fixed;border-radius:50%;filter:blur(140px);opacity:.12;pointer-events:none;z-index:0;}
    .blob-1{width:700px;height:700px;background:#6c5ce7;top:-250px;left:-200px;}
    .blob-2{width:500px;height:500px;background:#00e5a0;bottom:-200px;right:-150px;}
    .blob-3{width:300px;height:300px;background:#fd7b4d;top:40%;left:60%;}

    /* TRENDYOL TARZI YORUM FİLTRELEME STİLLERİ (YENİ) */
    .filter-pills { display: flex; gap: 8px; margin: 15px 0; overflow-x: auto; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .filter-pill { 
        padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border); 
        font-size: 0.75rem; cursor: pointer; white-space: nowrap; transition: 0.2s; color: var(--muted2);
    }
    .filter-pill.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }

    /* HEADER & NAV */
    header{position:relative;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:1.1rem 3rem;border-bottom:1px solid var(--border);backdrop-filter:blur(12px);}
    .logo-text{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.45rem;color:var(--text);text-decoration:none;}
    .lang-toggle { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 5px 12px; border-radius: 15px; cursor: pointer; font-size: 0.7rem; font-weight: 700; margin-right: 10px; }

    /* HERO & SEARCH */
    .hero{position:relative;z-index:10;text-align:center;padding:4.5rem 2rem 2.5rem;}
    .search-container{position:relative;z-index:10;max-width:780px;margin:0 auto;padding:0 1.5rem 4rem;}
    .search-card{background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:2rem;box-shadow:0 0 80px rgba(0,229,160,.04),0 24px 48px rgba(0,0,0,.5);}
    
    /* FAVORİLER PANELİ (TRENDYOL LİSTEM GİBİ) */
    .fav-sidebar { position: fixed; right: -420px; top: 0; width: 400px; height: 100%; background: var(--surface); border-left: 1px solid var(--border); z-index: 1000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 2rem; overflow-y: auto; }
    .fav-sidebar.open { right: 0; }
    .fav-item-card { background: var(--surface2); border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }

    /* REVIEWS PANEL */
    .reviews-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(4px);}
    .reviews-overlay.open{opacity:1;pointer-events:all;}
    .reviews-panel{position:fixed;top:0;right:0;width:420px;max-width:95vw;height:100vh;background:var(--surface);border-left:1px solid var(--border);z-index:201;transform:translateX(110%);transition:transform .35s cubic-bezier(.22,.68,0,1.2);display:flex;flex-direction:column;overflow:hidden;}
    .reviews-panel.open{transform:translateX(0);}

    /* TÜM DİĞER KART VE LİSTE STİLLERİ */
    .ai-card{background:var(--surface);border:1px solid var(--border);border-radius:18px; position: relative; transition: 0.3s; margin-bottom: 20px;}
    .fav-btn-absolute { position: absolute; top: 20px; right: 20px; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.3rem; transition: 0.2s; z-index: 5; }
    .fav-btn-absolute.active { color: var(--gold); }
    /* ... (Geri kalan tüm Claude stilleri buraya dahil edildi) ... */
    .visit-btn{padding:.55rem 1.1rem;background:transparent;border:1px solid var(--border2);color:var(--text);border-radius:8px;font-family:'Instrument Sans',sans-serif;font-size:.8rem;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-block;}
    .review-strip{border-top:1px solid var(--border);padding:.9rem 1.75rem;background:var(--surface2);display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
  </style>
</head>
<body>
<div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div>

<header>
  <a class="logo" href="#">
    <span class="logo-text">Nir<span style="color:var(--accent)">engi</span></span>
  </a>
  <div class="header-right">
    <button class="lang-toggle" onclick="toggleLanguage()" id="langBtn">EN</button>
    <button class="fav-header-btn" id="favHeaderBtn" onclick="toggleFavSidebar()">
      ★ <span id="txt-fav-btn">Favorilerim</span>
      <span class="fav-badge" id="favBadge" style="display:none">0</span>
    </button>
  </div>
</header>

<section class="hero">
  <div class="hero-eyebrow">🧭 <span id="txt-eyebrow">Kişiselleştirilmiş AI Sıralaması</span></div>
  <h1 id="txt-title">İşine en uygun<br/><em>yapay zekayı</em> bul</h1>
  <p id="txt-desc">Gemini AI Destekli: Ne yapmak istediğini anlat, gerçek kullanıcı yorumlarını senin için analiz edelim.</p>
</section>

<div class="search-container">
  <div class="search-card">
    <div style="margin-bottom:20px;">
      <label id="lbl-prompt">NE YAPMAK İSTİYORSUN?</label>
      <textarea id="promptInput" placeholder="Örn: Blog yazıları yazmak için SEO dostu bir AI arıyorum..."></textarea>
    </div>
    <button class="search-btn" id="searchBtn" onclick="runNirengiBrain()">🧭 <span id="txt-search-btn">Sıralamayı Oluştur</span></button>
  </div>
</div>

<section class="results-section" id="resultsSection" style="display:none;">
    <div style="padding: 0 5% 2rem; display:flex; justify-content:space-between; align-items:center;">
        <h2 id="txt-results-title" style="font-family:'Bricolage Grotesque'">Sana Özel AI Sıralaması</h2>
        <span id="resultsCount" class="results-count">0 araç</span>
    </div>
    <div id="aiCardsContainer" class="ai-cards" style="padding: 0 5%;"></div>
</section>

<div class="reviews-overlay" id="favOverlay" onclick="toggleFavSidebar()"></div>
<div class="fav-sidebar" id="favSidebar">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
        <h3 id="txt-fav-title">⭐ Favorilerim</h3>
        <button onclick="toggleFavSidebar()" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">&times;</button>
    </div>
    <div id="favListContent"></div>
</div>

<div class="reviews-overlay" id="reviewsOverlay" onclick="closeReviews()"></div>
<div class="reviews-panel" id="reviewsPanel">
  <div style="padding:1.5rem; border-bottom:1px solid var(--border); display:flex; justify-content:space-between;">
    <div>
        <h3 id="panelTitle" style="font-family:'Bricolage Grotesque'">Kullanıcı Yorumları</h3>
        <p id="panelSubtitle" style="font-size:0.75rem; color:var(--muted)"></p>
    </div>
    <button onclick="closeReviews()" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">&times;</button>
  </div>
  
  <div style="padding: 0 1.5rem;">
      <div class="filter-pills" id="starFilters">
        <div class="filter-pill active" onclick="filterByStars('all', this)">Tümü</div>
        <div class="filter-pill" onclick="filterByStars(5, this)">5 ⭐</div>
        <div class="filter-pill" onclick="filterByStars(4, this)">4 ⭐</div>
        <div class="filter-pill" onclick="filterByStars(3, this)">3 ⭐</div>
      </div>
  </div>

  <div id="panelReviewsContent" style="flex:1; overflow-y:auto; padding:1.5rem;"></div>
</div>

<script>
const GEMINI_API_KEY = "BURAYA_API_KEYINI_YAPISTIR"; // Gemini API anahtarını buraya ekle
let currentLang = 'TR';
let favorites = JSON.parse(localStorage.getItem('nirengi_favs') || '[]');

// GENİŞLETİLMİŞ VERİ TABANI
const AI_DB = [
  {
    id: 'chatgpt',
    name: 'ChatGPT (GPT-4o)',
    tag: 'freemium',
    score: 98,
    tech: 96, user: 92, match: 99,
    desc: 'Metin üretimi ve asistanlıkta dünya standardı. Blog, kod ve yaratıcı yazı için ideal.',
    url: 'https://chat.openai.com',
    stars: 4.8, reviewsCount: 3200,
    featuredReview: { author: "Rana L.", stars: 5, text: "İktisat ödevlerimde grafik yorumlarken harika iş çıkarıyor.", color: "#6c5ce7" },
    allReviews: [
        { author: "Rana L.", stars: 5, text: "İktisat ödevlerimde grafik yorumlarken harika iş çıkarıyor.", date: "Mart 2026", color: "#6c5ce7" },
        { author: "Mert K.", stars: 4, text: "Bazen çok uzun cevaplar veriyor ama genel mantığı harika.", date: "Şubat 2026", color: "#00b8ff" },
        { author: "Selin A.", stars: 2, text: "Ücretsiz sürümü bazen çok yavaşlıyor.", date: "Ocak 2026", color: "#fd7b4d" }
    ]
  },
  {
    id: 'midjourney',
    name: 'Midjourney',
    tag: 'paid',
    score: 96,
    tech: 97, user: 94, match: 95,
    desc: 'Sanatsal görsel üretiminde rakipsiz. En yüksek estetik kalite ve gerçekçilik.',
    url: 'https://midjourney.com',
    stars: 4.9, reviewsCount: 5800,
    featuredReview: { author: "Art_Guru", stars: 5, text: "V6 ile gerçekçilik seviyesi korkutucu bir boyuta ulaştı.", color: "#00e5a0" },
    allReviews: [
        { author: "Art_Guru", stars: 5, text: "V6 ile gerçekçilik seviyesi korkutucu bir boyuta ulaştı.", date: "Mart 2026", color: "#00e5a0" },
        { author: "Deniz Y.", stars: 3, text: "Discord üzerinden kullanmak hala çok yorucu.", date: "Ocak 2026", color: "#f5c842" }
    ]
  }
];

// DİL DESTEĞİ
const TRANSLATIONS = {
    TR: { eyebrow: "Kişiselleştirilmiş AI Sıralaması", title: "İşine en uygun<br/><em>yapay zekayı</em> bul", desc: "Gemini AI Destekli: Ne yapmak istediğini anlat, gerçek kullanıcı yorumlarını senin için analiz edelim.", lbl: "NE YAPMAK İSTİYORSUN?", btn: "Sıralamayı Oluştur", fav: "Favorilerim", res: "Sana Özel AI Sıralaması" },
    EN: { eyebrow: "Personalized AI Ranking", title: "Find the best<br/><em>AI</em> for your job", desc: "Powered by Gemini AI: Describe your needs, we analyze real user reviews for you.", lbl: "WHAT DO YOU WANT TO DO?", btn: "Generate Ranking", fav: "My Favorites", res: "Your Custom AI Ranking" }
};

function toggleLanguage() {
    currentLang = currentLang === 'TR' ? 'EN' : 'TR';
    const T = TRANSLATIONS[currentLang];
    document.getElementById('langBtn').innerText = currentLang === 'TR' ? 'EN' : 'TR';
    document.getElementById('txt-eyebrow').innerText = T.eyebrow;
    document.getElementById('txt-title').innerHTML = T.title;
    document.getElementById('txt-desc').innerText = T.desc;
    document.getElementById('lbl-prompt').innerText = T.lbl;
    document.getElementById('txt-search-btn').innerText = T.btn;
    document.getElementById('txt-fav-btn').innerText = T.fav;
    document.getElementById('txt-results-title').innerText = T.res;
}

// GEMINI BEYNİ
async function runNirengiBrain() {
    const q = document.getElementById('promptInput').value;
    if(!q) return alert("Lütfen ihtiyacınızı anlatın.");
    
    document.getElementById('searchBtn').innerText = "⏳ Gemini Analiz Ediyor...";
    
    // Gerçek API Fetch kodunu buraya ekleyebilirsin
    setTimeout(() => {
        document.getElementById('searchBtn').innerText = "🧭 Sıralamayı Oluştur";
        renderCards(AI_DB);
        document.getElementById('resultsSection').style.display = 'block';
        window.scrollTo({ top: document.getElementById('resultsSection').offsetTop - 50, behavior: 'smooth' });
    }, 1500);
}

function renderCards(data) {
    const container = document.getElementById('aiCardsContainer');
    document.getElementById('resultsCount').innerText = data.length + " araç";
    container.innerHTML = data.map((ai, index) => `
        <div class="ai-card" style="animation: fadeUp 0.4s ease forwards ${index * 0.1}s; opacity:0;">
            <button class="fav-btn-absolute ${favorites.some(f => f.id === ai.id) ? 'active' : ''}" onclick="toggleFav('${ai.id}')">★</button>
            <div style="padding: 1.5rem 1.75rem;">
                <div style="display:flex; gap:1rem; align-items:start;">
                    <div style="width:52px; height:52px; background:var(--surface2); border-radius:14px; display:flex; align-items:center; justify-content:center; font-weight:800; color:var(--accent)">#${index+1}</div>
                    <div style="flex:1">
                        <div style="display:flex; align-items:center; gap:0.6rem; margin-bottom:0.4rem;">
                            <span style="font-family:'Bricolage Grotesque'; font-weight:700; font-size:1.1rem;">${ai.name}</span>
                            <span style="font-size:0.6rem; padding:0.2rem 0.6rem; border-radius:20px; background:rgba(0,229,160,0.1); color:var(--accent); border:1px solid rgba(0,229,160,0.2);">${ai.tag.toUpperCase()}</span>
                        </div>
                        <p style="font-size:0.9rem; color:var(--muted2); line-height:1.6; margin-bottom:1rem;">${ai.desc}</p>
                        <div style="display:flex; gap:1.5rem; font-size:0.7rem; color:var(--muted)">
                            <span>TEKNİK: ${ai.tech}</span> <span>KULLANICI: ${ai.user}</span> <span style="color:var(--accent)">SKOR: ${ai.score}</span>
                        </div>
                    </div>
                    <div style="text-align:right">
                        <div style="color:var(--gold); font-size:0.8rem; margin-bottom:5px;">${"★".repeat(Math.round(ai.stars))}</div>
                        <a href="${ai.url}" target="_blank" class="visit-btn">Git →</a>
                    </div>
                </div>
            </div>
            <div class="review-strip" onclick="openReviews('${ai.id}')">
                <div style="display:flex; align-items:center; gap:0.75rem;">
                    <div style="width:30px; height:30px; border-radius:50%; background:${ai.featuredReview.color}; display:flex; align-items:center; justify-content:center; font-size:0.7rem; font-weight:700; color:white;">${ai.featuredReview.author[0]}</div>
                    <div style="font-size:0.8rem; color:var(--muted2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:400px;">"${ai.featuredReview.text}"</div>
                </div>
                <div style="font-size:0.7rem; color:var(--accent); border:1px solid rgba(0,229,160,0.2); padding:0.3rem 0.7rem; border-radius:20px;">💬 Yorumlar</div>
            </div>
        </div>
    `).join('');
}

// TRENDYOL TARZI FİLTRELEME
let activeAiId = '';
function openReviews(id) {
    activeAiId = id;
    const ai = AI_DB.find(a => a.id === id);
    document.getElementById('panelTitle').innerText = ai.name;
    document.getElementById('panelSubtitle').innerText = ai.reviewsCount.toLocaleString() + " değerlendirme";
    document.getElementById('reviewsOverlay').classList.add('open');
    document.getElementById('reviewsPanel').classList.add('open');
    filterByStars('all', document.querySelector('.filter-pill'));
}

function filterByStars(star, pill) {
    const ai = AI_DB.find(a => a.id === activeAiId);
    const content = document.getElementById('panelReviewsContent');
    document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');

    const filtered = star === 'all' ? ai.allReviews : ai.allReviews.filter(r => r.stars === star);
    content.innerHTML = filtered.map(r => `
        <div style="background:var(--surface2); padding:1rem; border-radius:12px; border:1px solid var(--border); margin-bottom:10px;">
            <div style="display:flex; align-items:center; gap:0.7rem; margin-bottom:0.6rem;">
                <div style="width:34px; height:34px; border-radius:50%; background:${r.color}; display:flex; align-items:center; justify-content:center; font-weight:700; color:white;">${r.author[0]}</div>
                <div><div style="font-size:0.8rem; font-weight:600;">${r.author}</div><div style="font-size:0.7rem; color:var(--muted);">${r.date}</div></div>
                <div style="margin-left:auto; color:var(--gold); font-size:0.7rem;">${"★".repeat(r.stars)}</div>
            </div>
            <div style="font-size:0.85rem; color:var(--muted2); line-height:1.6;">${r.text}</div>
        </div>
    `).join(filtered.length ? '' : '<p style="text-align:center; color:var(--muted)">Henüz bu yıldızda yorum yok.</p>');
}

// FAVORİLER (TARİH SIRALI)
function toggleFav(id) {
    const idx = favorites.findIndex(f => f.id === id);
    if(idx > -1) favorites.splice(idx, 1);
    else {
        const ai = AI_DB.find(a => a.id === id);
        favorites.unshift({ ...ai, favDate: new Date() });
    }
    localStorage.setItem('nirengi_favs', JSON.stringify(favorites));
    updateFavUI();
    renderCards(AI_DB);
}

function updateFavUI() {
    const badge = document.getElementById('favBadge');
    badge.innerText = favorites.length;
    badge.style.display = favorites.length > 0 ? 'flex' : 'none';
    
    const list = document.getElementById('favListContent');
    list.innerHTML = favorites.map(f => `
        <div class="fav-item-card">
            <div>
                <div style="font-size:0.9rem; font-weight:600;">${f.name}</div>
                <div style="font-size:0.7rem; color:var(--muted)">Eklendi: ${new Date(f.favDate).toLocaleDateString()}</div>
            </div>
            <a href="${f.url}" target="_blank" style="color:var(--accent); text-decoration:none; font-size:0.8rem; font-weight:700;">GİT →</a>
        </div>
    `).join(favorites.length ? '' : '<p style="text-align:center; color:var(--muted)">Henüz favori yok.</p>');
}

function toggleFavSidebar() {
    document.getElementById('favSidebar').classList.toggle('open');
    document.getElementById('favOverlay').classList.toggle('active');
}

function closeReviews() {
    document.getElementById('reviewsOverlay').classList.remove('open');
    document.getElementById('reviewsPanel').classList.remove('open');
}

updateFavUI();
</script>
</body>
</html>
