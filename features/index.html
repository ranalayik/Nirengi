<!DOCTYPE html>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=Instrument+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    /* MEVCUT TÜM CSS KODUNU BURAYA YAPISTIR - Ana hat değişmedi */
    :root {
      --bg: #07090f;
      --surface: #0e1219;
      --surface2: #141a24;
      --surface3: #1a2130;
      --border: rgba(255, 255, 255, 0.07);
      --border2: rgba(255, 255, 255, 0.12);
      --accent: #00e5a0;
      --accent-dim: rgba(0, 229, 160, 0.12);
      --accent2: #6c5ce7;
      --accent3: #fd7b4d;
      --gold: #f5c842;
      --text: #dde4f0;
      --muted: #5a6a85;
      --muted2: #8494af;
    }
    /* ... MEVCUT TÜM CSS ... */
    
    /* YENİ EKLEMELER - Ana yapıyı bozmadan */
    .lang-toggle {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.4rem 0.8rem;
      border-radius: 20px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .lang-toggle:hover { border-color: var(--accent); }
    .lang-toggle.active { background: var(--accent); color: #07090f; }
    
    .star-filter {
      display: flex;
      gap: 0.5rem;
      margin: 1rem 0;
      flex-wrap: wrap;
    }
    .star-btn {
      padding: 0.4rem 0.8rem;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      border-radius: 20px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .star-btn.active {
      border-color: var(--gold);
      background: rgba(245, 200, 66, 0.1);
      color: var(--gold);
    }
    
    .favorites-page {
      display: none;
      padding: 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    .favorites-page.active { display: block; }
    
    /* Gemini API loading */
    .gemini-loading {
      display: none;
      text-align: center;
      padding: 2rem;
      color: var(--muted);
    }
  </style>
</head>

    // YENİ: Dil değiştirme
    let currentLang = 'tr';
    function toggleLanguage(lang) {
      currentLang = lang;
      document.querySelectorAll('.lang-toggle').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      
      // Metinleri değiştir (data-lang attribute ile)
      document.querySelectorAll('[data-tr], [data-en]').forEach(el => {
        el.textContent = currentLang === 'tr' ? el.dataset.tr : el.dataset.en;
      });
    }

    // YENİ: Favoriler sayfası render
    function renderFavorites() {
      const favCards = document.getElementById('favCards');
      const sortedFavs = favs.map(name => {
        const tool = DB.find(t => t.name === name);
        return {...tool, addedDate: localStorage.getItem(`fav_${name}`) || new Date().toISOString()};
      }).sort((a,b) => new Date(b.addedDate) - new Date(a.addedDate));

      favCards.innerHTML = sortedFavs.map(tool => `
        <div class="ai-card">
          <div class="card-body">
            <h3>${tool.name}</h3>
            <p>${tool.desc}</p>
            <a href="${tool.url}" target="_blank">Ziyaret Et</a>
            <button onclick="toggleFav('${tool.name}', this)">★ Favorilerden Çıkar</button>

          <!-- Gerçek yorumlar -->
          <div class="review-strip">
            ${REAL_REVIEWS[tool.name]?.slice(0,2).map(r => `
              <div>⭐${r.stars} ${r.text} - ${r.author}</div>
            `).join('') || 'Yorum yükleniyor...'}
          </div>
        </div>
      `).join('');
    }

    async function analyzeWithGemini(prompt, tools) {
      document.getElementById('geminiLoading').style.display = 'block';
      
      try {
        const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=' + GEMINI_API_KEY, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{
              parts: [{
                text: `Kullanıcı "${prompt}" dedi. Bu araçlar arasında en uygun 3 tanesini seç ve nedenlerini açıkla: ${tools.map(t=>t.name).join(', ')}`
              }]
            }]
          })
        });
        
        const data = await response.json();
        console.log('Gemini yanıtı:', data);
        // Yanıtı UI'ya entegre et
      } catch(e) {
        console.error('Gemini hatası:', e);
      }
      
      document.getElementById('geminiLoading').style.display = 'none';
    }
